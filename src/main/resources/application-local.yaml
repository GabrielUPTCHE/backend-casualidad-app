# application-local.yml
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gestion_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway maneja el schema, JPA solo valida
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # útil la primera vez en una BD existente

management:
  datadog:
    metrics:
      export:
        enabled: false

logging:
  level:
    root: INFO
    com.tuempresa: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG