spring.application.name=casualidad-backend
spring.profiles.active=local
# Clave secreta para firmar los JWT (DEBE estar en Base64 y ser larga por seguridad)
# Esta clave es "mi-secreto-super-seguro-casualidad-app-2026-backend" en Base64
jwt.secret=bWktc2VjcmV0by1zdXBlci1zZWd1cm8tY2FzdWFsaWRhZC1hcHAtMjAyNi1iYWNrZW5k

# (Opcional) Tiempo de expiración del Access Token (1 día en milisegundos)
jwt.expiration=86400000

# (Opcional) Tiempo de expiración del Refresh Token (7 días en milisegundos)
jwt.refresh-token.expiration=604800000

# Esto le dice a Hibernate que actualice la BD creando las tablas que falten
spring.jpa.hibernate.ddl-auto=update

# Opcional pero recomendado para ver el SQL que se ejecuta por debajo
spring.jpa.show-sql=true